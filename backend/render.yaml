services:
  - type: web
    name: ai-healthcare-backend
    env: python
    plan: free
    buildCommand: |
      python -m pip install --upgrade pip
      pip install setuptools==68.0.0 wheel
      pip install -r requirements.txt
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18